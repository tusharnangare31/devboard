name: ci
on: 
  push:
    branches: [main]
      
jobs:
  code: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install npm
        run: npm install --prefix ./frontend
      
      - name: Lint
        run: npm run lint

      - name : Test
        run: npm run test
        
